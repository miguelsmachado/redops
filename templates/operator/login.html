{% extends "base.html" %}
{% block title %}Operator Login — REDOPS{% endblock %}
{% block content %}
<div style="min-height: calc(100vh - 60px); display: flex; align-items: center; justify-content: center; position: relative; z-index: 1;">
  <div style="width: 100%; max-width: 380px;">
    <div style="text-align: center; margin-bottom: 2rem;">
      <div style="font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-muted); letter-spacing: 3px; margin-bottom: 0.5rem;">// OPERATOR ACCESS</div>
      <div style="font-family: var(--font-display); font-size: 1.6rem; font-weight: 700; letter-spacing: 6px; text-transform: uppercase; color: var(--accent-cyan); text-shadow: 0 0 20px var(--accent-cyan-glow);">RED TEAM</div>
    </div>
    <div class="card">
      <div class="card-body">
        <form method="POST">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" autocomplete="username" required autofocus>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" autocomplete="current-password" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">Enter</button>
        </form>
      </div>
    </div>
    <div style="text-align: center; margin-top: 1rem;">
      <a href="{{ url_for('admin.login') }}" style="font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-muted); text-decoration: none;">Admin Access →</a>
    </div>
  </div>
</div>
{% endblock %}
